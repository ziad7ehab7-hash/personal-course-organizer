  <form>

    <!-- Course Name -->
    <label for="course">Course Name</label>
    <input type="text" id="course" placeholder="Enter course name" required>

    <!-- Instructor -->
    <label for="instructor">Instructor</label>
    <input type="text" id="instructor" placeholder="Enter instructor name" required>

    <!-- Credit Hours -->
    <label for="hours">Credit Hours</label>
    <input type="number" id="hours" min="1" max="6" placeholder="Enter hours" required>

    <!-- Notes -->
    <label for="notes">Notes</label>
    <textarea id="notes" placeholder="Write your notes here..."></textarea>

    <!-- Submit Button -->
